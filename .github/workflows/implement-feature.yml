name: Implement Feature

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'pending'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are implementing a feature for OptiLab, a static HTML/JS optical bench simulator.
            No build step - open `index.html` directly in a browser. All source is in `js/` and `styles/`.

            Key files:
            - `js/config.js` - all global state variables and constants
            - `js/element.js` - Element class, component types, ray-tracing segments
            - `js/input.js` - all mouse/keyboard event handlers
            - `js/renderer.js` - all canvas drawing functions
            - `js/state.js` - save/load/undo/redo
            - `js/ui/controls.js` - dynamic sidebar UI panel
            - `js/physics/raytracing.js` - ray casting and beam physics
            - `js/physics/optics.js` - Mueller matrix optics

            Coding conventions:
            - No comments unless the why is non-obvious
            - No build tools - plain JS, no imports, everything is global
            - Tailwind CSS classes for UI (loaded via CDN)
            - All state lives in `config.js` as `let` globals
            - Canvas coordinate system: world coords in mm, `worldToScreen`/`screenToWorld` for conversion
            - `saveToHistory()` before any mutation that should be undoable
            - `draw()` after any state change that affects visuals
            - `updateUI()` after selection changes
            - Always use `rehydrateElement(JSON.parse(JSON.stringify(el)))` to deep-copy an Element - never a plain JSON clone

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            Your task:
            1. Read the relevant source files to understand the current state
            2. Implement the feature described in the issue
            3. Create a branch named `feat/${{ github.event.issue.number }}-<short-slug>` from main
            4. Commit the changes with a descriptive message
            5. Create a PR with:
               - Title: the issue title
               - Body in exactly this format:
                 ## Description

                 <what to test and what correct behavior looks like>

                 Closes #${{ github.event.issue.number }}
               - Label: `ready-for-review`
            6. After creating the PR, mark issue #${{ github.event.issue.number }} as `claimed` (remove `pending` label, add `claimed` label)
          claude_args: |
            --max-turns 30
