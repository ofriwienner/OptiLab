name: Inbox to Issues

on:
  push:
    branches: [main]
    paths:
      - INBOX.md

jobs:
  process:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Create issues from INBOX.md
        run: |
          in_items=false
          created=0

          while IFS= read -r line; do
            if [[ "$line" == "---" ]]; then
              in_items=true
              continue
            fi
            if $in_items && [[ "$line" =~ ^[-*]\  ]]; then
              item="${line#[-*] }"
              item="${item#- }"
              [[ -z "$item" || "$item" == TBD* ]] && continue
              gh issue create --title "$item" --body "$item" --label pending
              created=$((created + 1))
            fi
          done < INBOX.md

          if [[ $created -gt 0 ]]; then
            cat > INBOX.md << 'EOF'
          # Feature Inbox

          Add feature requests below as bullet points. Claude reads this during bulk features runs, converts each item to a GitHub Issue, and clears the list.

          ---

          EOF
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git add INBOX.md
            git commit -m "Clear INBOX.md after creating $created issue(s) [skip ci]"
            git push origin main
          fi
